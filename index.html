  <script>
    // ── Utilities ──────────────────────────────────────────────
    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function topicBadgeClass(topic) {
      const map = {
        'AI & LLM':                    'badge-topic-ai',
        'Machine Learning':             'badge-topic-ml',
        'Data Science':                 'badge-topic-ds',
        'Python Development':           'badge-topic-python',
        'Algorithms & Data Structures': 'badge-topic-algo',
        'Web Scraping':                 'badge-topic-web',
        'Version Control':              'badge-topic-vc',
      };
      return map[topic] || 'badge-topic-default';
    }

    // ── Dark Mode ──────────────────────────────────────────────
    const html = document.documentElement;
    const darkToggle = document.getElementById('dark-mode-toggle');
    const darkIcon = document.getElementById('dark-icon');

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      darkIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
      localStorage.setItem('theme', theme);
    }

    applyTheme(localStorage.getItem('theme') || 'light');

    darkToggle.addEventListener('click', function() {
      // Spin animation on toggle
      darkToggle.classList.add('spinning');
      darkToggle.addEventListener('animationend', () => darkToggle.classList.remove('spinning'), { once: true });
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ── Navbar scroll shadow ───────────────────────────────────
    const navbar = document.querySelector('.custom-navbar');
    document.getElementById('main-content').addEventListener('scroll', function() {
      navbar.classList.toggle('scrolled', this.scrollTop > 40);
    });

    // ── Sidebar Toggle ─────────────────────────────────────────
    const toggleBtn = document.getElementById('toggle-sidebar');
    const sidebar = document.getElementById('sidebar');

    function toggleSidebar() {
      sidebar.classList.toggle('d-none');
      toggleBtn.classList.remove('blink');
    }
    toggleBtn.addEventListener('click', toggleSidebar);

    function handleInitialSidebar() {
      if (window.innerWidth < 768) {
        sidebar.classList.add('d-none');
        toggleBtn.classList.add('blink');
        setTimeout(() => toggleBtn.classList.remove('blink'), 4000);
      }
    }
    window.addEventListener('DOMContentLoaded', handleInitialSidebar);

    // ── Blog Rendering ─────────────────────────────────────────
    const mainContent = document.getElementById('main-content');
    const mainScroll  = document.getElementById('main-scroll');
    let cachedBlogData = [];
    let currentTopic = 'all';

    function renderBlogList(data) {
      const filterHtml = document.querySelector('.topic-filter-container').outerHTML;
      const footer = mainContent.querySelector('.site-footer');

      let html = filterHtml;
      html += `<h2 class="section-heading">Latest Posts</h2>`;

      if (data.length === 0) {
        html += `<p class="text-muted">No posts found for this filter.</p>`;
      } else {
        html += `<div class="blog-card-list">`;
        data.forEach((post, i) => {
          const safeTitle     = escapeHtml(post.title);
          const safeSummary   = escapeHtml(post.summary);
          const safeFile      = escapeHtml(post.file);
          const safeTopic     = escapeHtml(post.topic || '');
          const badgeClass    = topicBadgeClass(post.topic || '');

          const tagsHtml = post.tags
            ? post.tags.map(t => `<span class="badge-tag">${escapeHtml(t)}</span>`).join('')
            : '';

          const topicBadge = safeTopic
            ? `<span class="badge-topic ${badgeClass}">${safeTopic}</span>`
            : '';

          // --card-i drives the stagger delay in CSS
          html += `
          <a href="content/${safeFile}" class="blog-card" style="--card-i:${i}">
            ${topicBadge}
            <div class="blog-card-title">${safeTitle}</div>
            <div class="blog-card-summary">${safeSummary}</div>
            <div class="blog-card-footer">${tagsHtml}</div>
          </a>`;
        });
        html += `</div>`;
      }

      mainScroll.innerHTML = html;

      // Re-attach topic filter listeners
      document.querySelectorAll('.topic-filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          filterByTopic(this.getAttribute('data-topic'));
        });
      });
    }

    // ── Skeleton Loading ───────────────────────────────────────
    function showSkeleton(count = 5) {
      const filterHtml = document.querySelector('.topic-filter-container').outerHTML;
      let html = filterHtml + `<h2 class="section-heading">Latest Posts</h2><div class="blog-card-list">`;
      for (let i = 0; i < count; i++) {
        html += `
        <div class="skeleton-card">
          <div class="skeleton-line skeleton-badge"></div>
          <div class="skeleton-line skeleton-title"></div>
          <div class="skeleton-line skeleton-text"></div>
          <div class="skeleton-line skeleton-text short"></div>
          <div class="skeleton-line skeleton-tags"></div>
        </div>`;
      }
      html += `</div>`;
      mainScroll.innerHTML = html;
      // Re-attach filter buttons after skeleton render
      document.querySelectorAll('.topic-filter-btn').forEach(btn => {
        btn.addEventListener('click', function() { filterByTopic(this.getAttribute('data-topic')); });
      });
    }

    // ── Data Fetching ──────────────────────────────────────────
    showSkeleton();
    fetch('data/blogData.json?v=2.2', { cache: 'no-cache' })
      .then(res => res.json())
      .then(data => {
        cachedBlogData = data;
        renderBlogList(data);
      })
      .catch(() => {
        mainScroll.innerHTML = "<p class='text-danger'>Failed to load blog data.</p>";
      });

    // ── Search ─────────────────────────────────────────────────
    const searchForm  = document.querySelector("form[role='search']");
    const searchInput = searchForm.querySelector("input[type='search']");

    function performSearch() {
      const query = searchInput.value.trim().toLowerCase();
      let filtered = currentTopic === 'all'
        ? cachedBlogData
        : cachedBlogData.filter(p => p.topic === currentTopic);

      if (query) {
        filtered = filtered.filter(p =>
          p.title.toLowerCase().includes(query) ||
          p.summary.toLowerCase().includes(query) ||
          (p.tags && p.tags.some(t => t.toLowerCase().includes(query)))
        );
      }
      renderBlogList(filtered);
    }

    searchForm.addEventListener('submit', e => { e.preventDefault(); performSearch(); });
    searchInput.addEventListener('input', performSearch);

    // ── Topic Filter ───────────────────────────────────────────
    function filterByTopic(topic) {
      currentTopic = topic;
      document.querySelectorAll('.topic-filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-topic') === topic);
      });

      // Fade out → re-render → fade in
      const list = document.querySelector('.blog-card-list');
      if (list) {
        list.classList.add('fading');
        setTimeout(() => performSearch(), 180);
      } else {
        performSearch();
      }
    }

    document.querySelectorAll('.topic-filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        filterByTopic(this.getAttribute('data-topic'));
      });
    });

    // ── Nav Links ──────────────────────────────────────────────
    document.getElementById('about-link').addEventListener('click', function(e) {
      e.preventDefault();
      fetch('content/About.html')
        .then(r => r.text())
        .then(html => { mainScroll.innerHTML = html; })
        .catch(() => { mainScroll.innerHTML = "<p class='text-danger'>Could not load About page.</p>"; });
    });

    document.getElementById('contribute-link').addEventListener('click', function(e) {
      e.preventDefault();
      fetch('content/contribute.html')
        .then(r => r.text())
        .then(html => { mainScroll.innerHTML = html; })
        .catch(() => { mainScroll.innerHTML = "<p class='text-danger'>Could not load Contribute page.</p>"; });
    });
  </script>
